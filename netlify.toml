# Netlify config. SPA fallback lives in public/_redirects (copied into dist/
# by Vite, so it also works for manual dist/ deploys). Set VITE_API_URL in the
# site's environment settings — it is baked in at build time. See DEPLOY.md.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Vite hashes bundle filenames — cache them forever; index.html must always
# revalidate so deploys take effect immediately.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
